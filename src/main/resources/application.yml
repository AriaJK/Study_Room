# Tomcat服务器配置
server:
  tomcat:
    uri-encoding: UTF-8  # 解决Tomcat中文乱码
  port: 8080  # 后端启动端口
  servlet:
    context-path: /study_room  # 项目上下文路径（核心！前端请求必须加这个前缀）

# 数据库配置
spring:
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver  # MySQL8.0+驱动（适配你的8.0版本）
    url: jdbc:mysql://localhost:3306/study_room?useUnicode=true&characterEncoding=utf-8&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8
    username: root  # 你的数据库用户名
    password: a1234567  # 你的数据库密码

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 300MB  # 单个文件最大大小
      max-request-size: 300MB  # 单次请求最大文件大小
  # 静态资源路径配置
  resources:
    static-locations: classpath:static/,file:static/

# MyBatis-Plus配置（核心：已开启下划线转驼峰）
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml  # Mapper.xml文件路径
  # 实体类扫描包（多个包用逗号分隔）
  typeAliasesPackage: com.entity
  global-config:
    # 主键类型：1=用户输入ID（适配你的业务）
    id-type: 1
    # 字段策略：1=非NULL判断（插入/更新时只处理非NULL字段）
    field-strategy: 1
    # 开启驼峰-下划线转换（和configuration层配置重复，双重保障）
    db-column-underline: true
    # 调试用：自动刷新mapper（开发环境建议开启）
    refresh-mapper: true
    # 逻辑删除配置（-1=已删除，0=未删除）
    logic-delete-value: -1
    logic-not-delete-value: 0
    # 逻辑删除SQL注入器
    sql-injector: com.baomidou.mybatisplus.mapper.LogicSqlInjector
  configuration:
    map-underscore-to-camel-case: true  # 核心：开启下划线转驼峰（解决前端驼峰字段匹配问题）
    cache-enabled: false  # 关闭二级缓存（避免数据不一致）
    call-setters-on-nulls: true  # 显示NULL字段（前端不会出现undefined）
    # MySQL兼容配置：NULL值处理
    jdbc-type-for-null: 'null'